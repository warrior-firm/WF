<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CONTACT SOON!</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background: radial-gradient(circle at top, #1a1a1a 0%, #050505 70%);
      position: relative;
      color: white;
    }

    /* Background Glow */
    .bg-glow {
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(212,175,55,0.25) 0%, transparent 70%);
      border-radius: 50%;
      animation: pulse 5s infinite ease-in-out;
      filter: blur(20px);
    }

    .bg-glow.one {
      top: -150px;
      left: -120px;
    }

    .bg-glow.two {
      bottom: -180px;
      right: -120px;
      animation-delay: 2s;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        opacity: 0.5;
      }
      50% {
        transform: scale(1.2);
        opacity: 0.9;
      }
    }

    /* Main Card */
    .container {
      position: relative;
      z-index: 2;
      width: 90%;
      max-width: 850px;
      padding: 60px 40px;
      text-align: center;
      border-radius: 35px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(212,175,55,0.35);
      backdrop-filter: blur(15px);
      box-shadow:
        0 0 25px rgba(212,175,55,0.18),
        inset 0 0 20px rgba(255,255,255,0.03);
      overflow: hidden;
    }

    .container::before {
      content: '';
      position: absolute;
      top: -120px;
      left: -120px;
      width: 250px;
      height: 250px;
      background: rgba(212,175,55,0.08);
      border-radius: 50%;
      filter: blur(10px);
    }

    .logo {
      font-size: 14px;
      letter-spacing: 8px;
      color: #d4af37;
      margin-bottom: 20px;
      font-weight: 600;
    }

    h1 {
      font-size: 80px;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(180deg, #fff6d5, #d4af37);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px rgba(212,175,55,0.25);
      animation: floatText 3s ease-in-out infinite;
    }

    @keyframes floatText {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-8px);
      }
    }

    p {
      margin-top: 25px;
      color: rgba(255,255,255,0.7);
      font-size: 17px;
      letter-spacing: 1px;
    }

    .line {
      width: 120px;
      height: 4px;
      margin: 30px auto;
      border-radius: 10px;
      background: linear-gradient(to right, transparent, #d4af37, transparent);
      animation: shine 2.5s linear infinite;
    }

    @keyframes shine {
      0% {
        opacity: 0.4;
        transform: scaleX(0.8);
      }
      50% {
        opacity: 1;
        transform: scaleX(1.1);
      }
      100% {
        opacity: 0.4;
        transform: scaleX(0.8);
      }
    }

    .button {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 38px;
      border-radius: 999px;
      text-decoration: none;
      color: #111;
      font-weight: 700;
      background: linear-gradient(135deg, #f7e29c, #d4af37);
      transition: 0.3s ease;
      box-shadow: 0 0 20px rgba(212,175,55,0.35);
    }

    .button:hover {
      transform: translateY(-4px) scale(1.03);
      box-shadow: 0 0 35px rgba(212,175,55,0.6);
    }

    /* Floating Particles */
    .particles span {
      position: absolute;
      display: block;
      width: 6px;
      height: 6px;
      background: rgba(212,175,55,0.8);
      border-radius: 50%;
      animation: move 12s linear infinite;
      bottom: -100px;
    }

    .particles span:nth-child(1) {
      left: 10%;
      width: 4px;
      height: 4px;
      animation-duration: 8s;
    }

    .particles span:nth-child(2) {
      left: 25%;
      animation-duration: 14s;
    }

    .particles span:nth-child(3) {
      left: 40%;
      width: 8px;
      height: 8px;
      animation-duration: 10s;
    }

    .particles span:nth-child(4) {
      left: 60%;
      animation-duration: 16s;
    }

    .particles span:nth-child(5) {
      left: 80%;
      width: 5px;
      height: 5px;
      animation-duration: 12s;
    }

    @keyframes move {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      100% {
        transform: translateY(-110vh) rotate(360deg);
        opacity: 0;
      }
    }

    @media (max-width: 768px) {
      .container {
        padding: 45px 25px;
        border-radius: 28px;
      }

      h1 {
        font-size: 48px;
      }

      p {
        font-size: 14px;
      }

      .logo {
        font-size: 12px;
        letter-spacing: 5px;
      }
    }
  </style>
</head>
<body>

  <div class="bg-glow one"></div>
  <div class="bg-glow two"></div>

  <div class="particles">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
  </div>

  <div class="container">
    <div class="logo">WARRIORFIRM</div>

    <h1>CONTACT<br>SOON!</h1>

    <div class="line"></div>

    <p>
      Our contact page is coming soon.<br>
      Stay tuned for the next update.
    </p>

    <a href="https://warriorfirm.my.id" class="button">COMING SOON</a>
  </div>

</body>
</html>
